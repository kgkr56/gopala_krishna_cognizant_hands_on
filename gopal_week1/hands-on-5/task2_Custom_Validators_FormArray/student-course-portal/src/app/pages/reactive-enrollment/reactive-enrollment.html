<section class="form-page">
  <h1>Reactive Course Enrollment</h1>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label for="studentName">Student Name <span class="required">*</span></label>
      <input id="studentName" type="text" formControlName="studentName" placeholder="Enter your full name" />
      <span *ngIf="studentNameControl.touched && studentNameControl.errors?.['required']" class="error-msg">
        Name is required.
      </span>
      <span *ngIf="studentNameControl.touched && studentNameControl.errors?.['minlength']" class="error-msg">
        Name must be at least 3 characters.
      </span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email <span class="required">*</span></label>
      <input id="studentEmail" type="email" formControlName="studentEmail" placeholder="Enter your email" />
      <span *ngIf="studentEmailControl.touched && studentEmailControl.errors?.['required']" class="error-msg">
        Email is required.
      </span>
      <span *ngIf="studentEmailControl.touched && studentEmailControl.errors?.['email']" class="error-msg">
        Please enter a valid email address.
      </span>
      <span *ngIf="studentEmailControl.touched && studentEmailControl.errors?.['emailTaken']" class="error-msg">
        Email taken.
      </span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID <span class="required">*</span></label>
      <input id="courseId" type="text" formControlName="courseId" placeholder="Enter course code" />
      <span *ngIf="courseIdControl.touched && courseIdControl.errors?.['required']" class="error-msg">
        Course code is required.
      </span>
      <span *ngIf="courseIdControl.touched && courseIdControl.errors?.['noCourseCode']" class="error-msg">
        Course code starting with XX is not allowed.
      </span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester <span class="required">*</span></label>
      <select id="preferredSemester" formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span *ngIf="enrollForm.get('preferredSemester')?.touched && enrollForm.get('preferredSemester')?.errors?.['required']" class="error-msg">
        Please select a semester.
      </span>
    </div>

    <div class="form-group checkbox-group">
      <input id="agreeToTerms" type="checkbox" formControlName="agreeToTerms" />
      <label for="agreeToTerms">I agree to the terms and conditions <span class="required">*</span></label>
    </div>
    <span *ngIf="enrollForm.get('agreeToTerms')?.touched && enrollForm.get('agreeToTerms')?.errors?.['requiredTrue']" class="error-msg">
      You must agree to the terms.
    </span>

    <div class="form-group">
      <label>Additional Courses</label>
      <button type="button" class="btn-add" (click)="addCourse()">Add Another Course</button>
    </div>

    <div class="form-array">
      <div class="form-group" *ngFor="let ctrl of additionalCourses.controls; let i = index">
        <label [for]="'additionalCourse' + i">Course {{ i + 1 }}</label>
        <div class="form-array-row">
          <input [id]="'additionalCourse' + i" [formControl]="ctrl" placeholder="Enter additional course" />
          <button type="button" class="btn-remove" (click)="removeCourse(i)">Remove</button>
        </div>
        <span *ngIf="ctrl.touched && ctrl.errors?.['required']" class="error-msg">
          Course is required.
        </span>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-submit">Submit</button>
    </div>
  </form>
</section>
