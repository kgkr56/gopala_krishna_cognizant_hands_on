<!--
  Task 2 — Validation & Error Messages
  ======================================
  Step 43: Validators added: required, minlength, email (built-in HTML/Angular).
  Step 44: #nameCtrl='ngModel' exposes the control's errors object in the template.
  Step 45: ng-invalid.ng-touched / ng-valid.ng-touched CSS classes (in the stylesheet).
  Step 46: *ngIf="submitted" shows the success banner after a valid submit.
  Step 47: Reset button calls onReset(enrollForm) → enrollForm.resetForm().

  WHY use touched (not dirty) for showing errors:
  touched = user focused and then BLURRED the field.
  dirty   = user changed the value.
  Using touched means errors appear AFTER the user leaves, not while typing.
-->
<section class="form-page">
  <h1>Course Enrollment Request</h1>

  <!-- Step 46: Success banner — visible only after a valid submit -->
  <div *ngIf="submitted" class="success-banner" role="alert">
    <span>✔</span> Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>

    <!-- ── Student Name ───────────────────────────────────────────────── -->
    <div class="form-group">
      <label for="studentName">Student Name <span style="color:red">*</span></label>
      <input
        id="studentName"
        type="text"
        name="studentName"
        #nameCtrl="ngModel"
        [(ngModel)]="studentName"
        required
        minlength="3"
        placeholder="Enter your full name"
      />
      <!--
        Step 44: Show errors only when the field is touched (user left the field).
        nameCtrl.errors?.['required'] / nameCtrl.errors?.['minlength'] are
        populated by Angular's built-in validators.
      -->
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" class="error-msg">
        Name is required.
      </span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" class="error-msg">
        Name must be at least 3 characters.
      </span>
    </div>

    <!-- ── Student Email ──────────────────────────────────────────────── -->
    <div class="form-group">
      <label for="studentEmail">Student Email <span style="color:red">*</span></label>
      <input
        id="studentEmail"
        type="email"
        name="studentEmail"
        #emailCtrl="ngModel"
        [(ngModel)]="studentEmail"
        required
        email
        placeholder="Enter your email"
      />
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" class="error-msg">
        Email is required.
      </span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" class="error-msg">
        Please enter a valid email address.
      </span>
    </div>

    <!-- ── Course ID ──────────────────────────────────────────────────── -->
    <div class="form-group">
      <label for="courseId">Course ID <span style="color:red">*</span></label>
      <input
        id="courseId"
        type="number"
        name="courseId"
        #courseCtrl="ngModel"
        [(ngModel)]="courseId"
        required
        placeholder="Enter course ID"
      />
      <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" class="error-msg">
        Course ID is required.
      </span>
    </div>

    <!-- ── Preferred Semester ─────────────────────────────────────────── -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester <span style="color:red">*</span></label>
      <select
        id="preferredSemester"
        name="preferredSemester"
        #semCtrl="ngModel"
        [(ngModel)]="preferredSemester"
        required
      >
        <option value="">-- Select --</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span *ngIf="semCtrl.touched && semCtrl.errors?.['required']" class="error-msg">
        Please select a semester.
      </span>
    </div>

    <!-- ── Agree to Terms ─────────────────────────────────────────────── -->
    <div class="form-group checkbox-group">
      <input
        id="agreeToTerms"
        type="checkbox"
        name="agreeToTerms"
        #termsCtrl="ngModel"
        [(ngModel)]="agreeToTerms"
        required
      />
      <label for="agreeToTerms">
        I agree to the terms and conditions <span style="color:red">*</span>
      </label>
    </div>
    <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']" class="error-msg">
      You must agree to the terms.
    </span>

    <!-- ── Actions ────────────────────────────────────────────────────── -->
    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-submit">
        Submit
      </button>
      <!-- Step 47: Reset clears all fields and validation state -->
      <button type="button" class="btn-reset" (click)="onReset(enrollForm)">
        Reset
      </button>
    </div>

  </form>
</section>
