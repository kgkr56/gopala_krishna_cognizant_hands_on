<section class="course-list-page">
  <h1>Available Courses</h1>
  <div class="course-list-grid">
    <app-course-card
      *ngFor="let course of courses"
      [course]="course"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>
  </div>
  <p class="selected-course">Selected course ID: {{ selectedCourseId }}</p>
</section>
