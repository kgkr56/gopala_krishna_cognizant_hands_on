<!--
  CourseCardComponent Template
  =============================
  Renders course data from @Input course.
  Emits enrollRequested on button click (tested in Step 104).
  isEnrolled controls button label and enrolled badge.
-->
<article class="course-card" [class.enrolled]="isEnrolled">
  <div class="card-badge" *ngIf="isEnrolled">✓ Enrolled</div>

  <!-- Step 103: h3 renders course.name — queried by By.css('h3') in the test -->
  <h3>{{ course.name }}</h3>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p>
    <strong>Status:</strong>
    <span [class]="'badge badge-' + course.gradeStatus">{{ course.gradeStatus }}</span>
  </p>

  <!--
    Step 104: Button click calls onEnrollClick() which emits enrollRequested.
    Test: spyOn(component.enrollRequested, 'emit')
           then click → expect emit toHaveBeenCalledWith(course.id)
  -->
  <button
    type="button"
    class="btn-enroll"
    [class.btn-unenroll]="isEnrolled"
    (click)="onEnrollClick()"
  >
    {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
  </button>
</article>
