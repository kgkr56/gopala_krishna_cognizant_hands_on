<!--
  Task 2 — Attribute Directives: ngClass & ngStyle
  ==================================================
  Step 32: [ngClass]="cardClasses" binds to the getter in the component class.
           The getter returns { 'card--enrolled': bool, 'card--full': bool, 'expanded': bool }.
           Using a getter keeps the template clean and logic in one place.

  Step 30: [ngStyle]="borderStyle" applies a dynamic left-border colour
           based on gradeStatus (green / red / grey).
-->
<article
  class="course-card"
  [ngClass]="cardClasses"
  [ngStyle]="borderStyle">

  <h2>{{ course.name }}</h2>
  <p><strong>ID:</strong> {{ course.id }}</p>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>

  <!-- Step 27: *ngSwitch grade-status badge -->
  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge badge--passed">✔ Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--failed">✘ Failed</span>
    <span *ngSwitchDefault          class="badge badge--pending">⏳ Pending</span>
  </div>

  <!--
    Step 31: 'Show Details' toggles isExpanded.
    The 'expanded' class is included in the cardClasses getter,
    so toggling isExpanded automatically adds/removes it via [ngClass].
  -->
  <button class="btn-toggle" (click)="toggleExpand()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <!-- Extra content revealed when expanded -->
  <div *ngIf="isExpanded" class="extra-details">
    <p><strong>Enrolled:</strong> {{ course.enrolled ? 'Yes' : 'No' }}</p>
    <p><strong>Grade Status:</strong> {{ course.gradeStatus | titlecase }}</p>
  </div>

  <button class="btn-enroll" (click)="onEnroll()">Enroll</button>
</article>
