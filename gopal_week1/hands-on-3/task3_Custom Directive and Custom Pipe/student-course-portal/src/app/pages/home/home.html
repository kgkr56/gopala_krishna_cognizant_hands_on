<section class="home-page">
  <h1>{{ portalName }}</h1>
  <p>Track your courses, view progress, and access your student profile from one central dashboard.</p>
  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p *ngIf="message" class="message">{{ message }}</p>
  <div class="stats-row">
    <div class="stat-card"><strong>Courses Available:</strong> {{ coursesAvailable }}</div>
    <div class="stat-card"><strong>Enrolled:</strong> 3</div>
    <div class="stat-card"><strong>GPA:</strong> 3.8</div>
  </div>
</section>
