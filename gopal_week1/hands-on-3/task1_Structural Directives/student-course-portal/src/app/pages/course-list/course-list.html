<!--
  Task 1 — Structural Directives
  ================================
  Step 25: *ngIf shows the loading spinner while isLoading is true,
           then shows the course section once it flips to false.

  NOTE — *ngIf vs CSS display:none
  When *ngIf is false the element is completely REMOVED from the DOM.
  CSS display:none merely hides it but the element stays in the DOM,
  consuming memory and participating in change detection.
-->
<section class="course-list-page">
  <h1>Available Courses</h1>

  <!-- Loading indicator — visible for the first 1.5 seconds (Step 25) -->
  <div *ngIf="isLoading" class="loading-indicator" role="status">
    <span class="spinner" aria-hidden="true"></span>
    <p>Loading courses...</p>
  </div>

  <!--
    Step 25 + 28: When isLoading is false, show either the grid or the empty state.
    The "else noCourses" syntax points to the <ng-template> further below.
    The else block is never added to the DOM when the condition is true —
    this is fundamentally different from display:none which hides but keeps the element.
  -->
  <ng-container *ngIf="!isLoading">
    <div *ngIf="courses.length > 0; else noCourses" class="course-list-grid">

      <!--
        Step 26: *ngFor renders one <app-course-card> per course.
        trackBy: trackByCourseId — Angular uses course.id as a stable key.
        Without trackBy, Angular re-renders every list item on any array change.
        With trackBy, only the changed items are updated (see TS comment for full detail).
      -->
      <app-course-card
        *ngFor="let course of courses; trackBy: trackByCourseId"
        [course]="course"
        (enrollRequested)="onEnroll($event)">
      </app-course-card>
    </div>

    <!--
      Step 28: ng-template is the else block.
      It is NEVER inserted into the DOM when courses.length > 0.
      Angular only stamps it into the DOM when the condition is false.
    -->
    <ng-template #noCourses>
      <div class="no-courses" role="alert">
        <p>📭 No courses available.</p>
      </div>
    </ng-template>
  </ng-container>

  <p *ngIf="selectedCourseId" class="selected-course">
    Selected course ID: {{ selectedCourseId }}
  </p>
</section>
