<!--
  Step 100: Enroll/Unenroll button
  =================================
  The label switches based on isEnrolled (derived from @Input enrolledIds).
  When the parent's store emits a new enrolledIds array, Angular re-evaluates
  this binding and re-renders the button label — no manual change detection needed.
-->
<article class="course-card" [class.enrolled]="isEnrolled">
  <div class="card-badge" *ngIf="isEnrolled">✓ Enrolled</div>
  <h3>{{ course.name }}</h3>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p>
    <strong>Status:</strong>
    <span [class]="'badge badge-' + course.gradeStatus">{{ course.gradeStatus }}</span>
  </p>
  <!--
    Step 100: Dispatch enrollInCourse or unenrollFromCourse
    {{ (enrolledIds$ | async)?.includes(course.id) ? 'Unenroll' : 'Enroll' }}
    Here enrolledIds is passed as @Input from the parent (no async pipe needed in the card).
  -->
  <button
    type="button"
    class="btn-enroll"
    [class.btn-unenroll]="isEnrolled"
    (click)="toggleEnrollment()"
  >
    {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
  </button>
</article>
