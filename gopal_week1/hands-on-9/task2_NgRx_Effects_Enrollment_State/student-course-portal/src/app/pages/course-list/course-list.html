<!--
  Steps 96, 98, 100: CourseList Template
  ========================================
  Using the async pipe for ALL observables:
    - courses$      ‚Üí renders the card grid
    - loading$      ‚Üí shows spinner
    - error$        ‚Üí shows error banner
    - enrolledIds$  ‚Üí passed to each CourseCard as @Input

  Step 100 pattern from the exercise brief:
    {{ (enrolledIds$ | async)?.includes(course.id) ? 'Unenroll' : 'Enroll' }}
  Here we resolve enrolledIds$ in the parent and pass the array down to
  CourseCard[@Input enrolledIds] to keep the template clean.
-->
<section class="course-list-page">
  <h1>Course List</h1>
  <p class="subtitle">Powered by NgRx Effects ‚Äî watch the Redux DevTools action stream.</p>

  <!-- Loading indicator -->
  <div *ngIf="loading$ | async" class="loading-msg">
    ‚è≥ Loading courses...
  </div>

  <!-- Error banner -->
  <div *ngIf="error$ | async as error" class="error-banner" role="alert">
    ‚ö†Ô∏è {{ error }}
  </div>

  <!--
    Unwrap enrolledIds$ ONCE at the container level with *ngIf as a binding.
    Pass it down to each card so cards don't open their own store subscriptions.
  -->
  <ng-container *ngIf="enrolledIds$ | async as enrolledIds">
    <div class="course-grid" *ngIf="!(loading$ | async)">
      <app-course-card
        *ngFor="let course of courses$ | async"
        [course]="course"
        [enrolledIds]="enrolledIds"
      ></app-course-card>
    </div>
  </ng-container>

  <p *ngIf="!(loading$ | async) && (courses$ | async)?.length === 0 && !(error$ | async)" class="empty-msg">
    No courses found.
  </p>
</section>
